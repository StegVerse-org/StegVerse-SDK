org:
  name: "StegVerse-SDK"
  tier: "production"
  policy_strictness: 0.95

  features:
    ingestion: true
    stegdb_telemetry: true
    governance_core: true
    entity_coordination: true       # full bridge
    cost_accounting: true           # billing enabled
    deterministic_gates: true       # strict determinism
    bridge_llm_routing: true

  paths:
    use_txt_extension: true
    no_leading_dot: true

  secrets:
    manager: "TV/TVC"
    ephemeral: true
    platform_agnostic: true
    no_hardcoded_tokens: true

  telemetry:
    log_level: "info"
    retention_days: 90
    org_segregated: true

  governance:
    allow_threshold: 0.95
    deny_threshold: 0.05
    fail_closed_default: true
