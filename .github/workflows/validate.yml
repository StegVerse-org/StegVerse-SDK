name: validate

on:
  push:
    paths-ignore:
      - 'evidence/sdk-validation-diagnostic.json'
      - 'evidence/system-boundary-*.json'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install SDK validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -c "import jsonschema, pytest, requests, yaml, dotenv"
      - name: Capture canonical SDK validation result
        run: python scripts/capture_sdk_validation_diagnostic.py
      - name: Persist canonical diagnostic
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = 'evidence/sdk-validation-diagnostic.json';
            const content = fs.readFileSync(path, 'utf8');
            let currentSha;
            let currentContent = '';
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: 'main'
              });
              currentSha = existing.data.sha;
              currentContent = Buffer.from(existing.data.content, 'base64').toString('utf8');
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            if (currentContent === content) {
              core.info('No SDK validation diagnostic change.');
              return;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'chore: retain SDK validation diagnostic [diagnostic]',
              content: Buffer.from(content).toString('base64'),
              branch: 'main',
              sha: currentSha
            });
      - name: Enforce canonical SDK validation result
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('evidence/sdk-validation-diagnostic.json').read_text())
          print('SDK validation status:', report.get('status'))
          failure = report.get('first_failure')
          if failure:
              print('First failure command:', ' '.join(failure.get('command', [])))
              print(failure.get('output_tail', ''))
          raise SystemExit(0 if report.get('status') == 'PASS' else 1)
          PY
