name: SDK Demo Pipeline Test

on:
  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test depth'
        required: true
        default: 'full'
        type: choice
        options:
          - quick      # SDK install + basic import
          - standard   # SDK install + demo call + confidence check
          - full       # SDK install + all modes + reconstruction + replay
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: StegVerse-org/StegVerse-SDK

      # ============================================
      # TEST 1: SDK Installation
      # ============================================
      - name: Install SDK
        run: |
          pip install stegverse-sdk
          python -c "import stegverse_sdk; print(f'SDK version: {stegverse_sdk.__version__}')"

      - name: Verify SDK components
        run: |
          python -c "
          from stegverse_sdk import submit_intent, StegVerseLLMAdapter, govern_llm_output
          print('Core imports: OK')
          "

      # ============================================
      # TEST 2: SDK -> Demo-Suite Connection
      # ============================================
      - name: Test SDK demo call
        run: |
          python -c "
          from stegverse_sdk import submit_intent

          # Submit a demo intent
          result = submit_intent(
              action='demo',
              mode='execution_governance',
              reset='hard'
          )

          assert result['status'] == 'submitted', f'Failed: {result}'
          print(f'Demo intent submitted: {result["receipt_id"]}')
          "

      # ============================================
      # TEST 3: LLM Adapter Integration
      # ============================================
      - name: Test LLM Adapter
        run: |
          python -c "
          from stegverse_sdk import StegVerseLLMAdapter

          adapter = StegVerseLLMAdapter(
              provider='openai',
              model='gpt-4'
          )

          # Simulate LLM output governance
          llm_output = {'action': 'deploy_change', 'confidence': 0.95}
          governed = adapter.govern_output(llm_output)

          assert 'decision' in governed, 'Governance decision missing'
          assert governed['decision'] in ['ALLOW', 'DENY', 'FAIL_CLOSED']
          print(f'LLM governance: {governed["decision"]}')
          "

      # ============================================
      # TEST 4: Confidence Score Visibility
      # ============================================
      - name: Test confidence score retrieval
        run: |
          python -c "
          from stegverse_sdk import get_demo_status

          status = get_demo_status(
              run_id='latest',
              include_reconstruction=True
          )

          assert 'confidence' in status, 'Confidence score missing'
          assert status['confidence']['percentage'] >= 95, f'Confidence too low: {status["confidence"]["percentage"]}'

          print(f'Confidence: {status["confidence"]["percentage"]}%')
          print(f'Reconstruction: {status["reconstruction"]["state_transitions"]}')
          "

      # ============================================
      # TEST 5: Full Pipeline End-to-End
      # ============================================
      - name: Full pipeline test
        if: github.event.inputs.test_level == 'full' || github.event_name == 'schedule'
        run: |
          python -c "
          from stegverse_sdk import submit_intent, get_demo_status
          import time

          # Run all modes
          modes = ['execution_governance', 'mutation_governance', 'governance_matrix', 'governance_random_sweep', 'full']

          for mode in modes:
              print(f'\nTesting mode: {mode}')

              result = submit_intent(
                  action='demo',
                  mode=mode,
                  reset='hard',
                  seed=42,
                  samples=10
              )

              assert result['status'] == 'submitted'

              # Poll for completion (simplified)
              time.sleep(30)

              status = get_demo_status(run_id=result['receipt_id'])
              assert status['status'] == 'PASS', f'Mode {mode} failed: {status}'

              if mode == 'full':
                  assert status['confidence']['percentage'] >= 95
                  assert 'reconstruction' in status
                  assert 'replay' in status

              print(f'  {mode}: PASS (confidence: {status.get("confidence", {}).get("percentage", "N/A")})')

          print('\nAll modes passed!')
          "

      # ============================================
      # TEST 6: Mobile-Friendly Trigger
      # ============================================
      - name: Verify workflow_dispatch works
        run: |
          echo "This workflow can be triggered from GitHub Mobile:"
          echo "Actions -> SDK Demo Pipeline Test -> Run workflow -> Select test_level"

      # ============================================
      # REPORT
      # ============================================
      - name: Generate test report
        if: always()
        run: |
          cat > test_report.json << 'EOF'
          {
            "test_run": "${{ github.run_id }}",
            "timestamp": "${{ github.event.head_commit.timestamp }}",
            "test_level": "${{ github.event.inputs.test_level || 'scheduled' }}",
            "sdk_version": "$(pip show stegverse-sdk | grep Version | cut -d' ' -f2)",
            "status": "${{ job.status }}",
            "public_ready": "${{ job.status == 'success' }}"
          }
          EOF

          cat test_report.json

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-demo-test-${{ github.run_id }}
          path: test_report.json
