name: StegVerse SDK Demo Test

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify SDK imports
        run: |
          python -c "import stegverse; print(f'SDK version: {stegverse.__version__}')"
          python -c "from stegverse import submit_intent, StegVerseLLMAdapter, govern_llm_output, StegVerseSDK; print('Core imports: OK')"
          python -c "from stegverse import handle_universal_transition_table_package; print('Universal transition-table intake import: OK')"
          python -c "from stegverse import validate_free_tier_metadata; print('Free-tier metadata ingestion import: OK')"

      - name: Verify free-tier metadata ingestion
        run: python scripts/verify_free_tier_metadata_ingestion.py

      - name: Verify HPS SDK route fixtures
        run: |
          python scripts/verify_hps_sdk_route.py examples/hps_sdk_route_allowed.json
          python scripts/verify_hps_sdk_route.py examples/hps_sdk_route_expired.json
          python scripts/verify_hps_sdk_route.py examples/hps_sdk_route_fail_closed.json

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=stegverse --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  safety-stack:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test safety stack
        run: python tests/test_safety_stack_quick.py

  llm-adapter:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test LLM adapter
        run: python tests/test_llm_adapter_quick.py

  build:
    runs-on: ubuntu-latest
    needs: [test, safety-stack, llm-adapter]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Verify wheel imports
        run: |
          pip install dist/*.whl
          python -c "import stegverse; print(f'Wheel OK: {stegverse.__version__}')"
          python -c "from stegverse import handle_universal_transition_table_package; print('Wheel universal transition-table intake import: OK')"
          python -c "from stegverse import validate_free_tier_metadata; print('Wheel free-tier metadata ingestion import: OK')"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 90

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Generate release notes
        run: |
          echo "## StegVerse SDK ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Install" >> RELEASE_NOTES.md
          echo "\`\`\`bash" >> RELEASE_NOTES.md
          echo "pip install stegverse-sdk==${{ github.ref_name }}" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Artifacts" >> RELEASE_NOTES.md
          echo "- Wheel and source distribution attached below" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Post-Release" >> RELEASE_NOTES.md
          echo "Downstream ingestion via [demo_ingest_engine](https://github.com/StegVerse-org/demo_ingest_engine)" >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          fail_on_unmatched_files: true

  pypi:
    runs-on: ubuntu-latest
    needs: [build, release]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/stegverse-sdk
    permissions:
      id-token: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  demo-ingestion:
    runs-on: ubuntu-latest
    needs: [build, release, pypi]
    if: always() && needs.build.result == 'success'
    permissions:
      contents: read
      actions: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Upload SDK bundle for ingestion
        uses: actions/upload-artifact@v4
        with:
          name: sdk-bundle
          path: dist/*.whl
          retention-days: 90

      - name: Trigger demo-ingestion plan mode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"

          echo "SDK Build Complete"
          echo "Artifact URL: $ARTIFACT_URL"
          echo "PyPI: https://pypi.org/project/stegverse-sdk/${{ github.ref_name }}"
          echo ""

          gh workflow run run-ingest.yml             --repo StegVerse-org/demo_ingest_engine             -f mode="plan"             -f source_path="$ARTIFACT_URL"             -f conflict_mode="archive"             || echo "Could not trigger demo_ingest_engine"

      - name: Log downstream chain
        run: |
          echo ""
          echo "=== DEMO-INGESTION ORCHESTRATION ==="
          echo "Version: ${{ github.ref_name }}"
          echo "PyPI: https://pypi.org/project/stegverse-sdk/${{ github.ref_name }}"
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo ""
          echo "To complete: demo_ingest_engine plan-mode artifact is available for governed orchestration"
