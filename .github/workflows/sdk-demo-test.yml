name: StegVerse SDK Demo Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify SDK imports
        run: |
          python -c "import stegverse; print(f'SDK version: {stegverse.__version__}')"
          python -c "from stegverse import submit_intent, StegVerseLLMAdapter, govern_llm_output, StegVerseSDK; print('Core imports: OK')"

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=stegverse --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  safety-stack:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test safety stack
        run: python tests/test_safety_stack_quick.py

  llm-adapter:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test LLM adapter
        run: python tests/test_llm_adapter_quick.py

  build:
    runs-on: ubuntu-latest
    needs: [test, safety-stack, llm-adapter]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Verify wheel imports
        run: |
          pip install dist/*.whl
          python -c "import stegverse; print(f'Wheel OK: {stegverse.__version__}')"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 90

  # ============================================================
  # RELEASE — creates GitHub Release on version tags (v*)
  # ============================================================
  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Generate release notes
        run: |
          echo "## StegVerse SDK ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Artifacts" >> RELEASE_NOTES.md
          echo "- \`stegverse-sdk-${{ github.ref_name }}-py3-none-any.whl\` — wheel distribution" >> RELEASE_NOTES.md
          echo "- \`stegverse-sdk-${{ github.ref_name }}.tar.gz\` — source distribution" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Verification" >> RELEASE_NOTES.md
          echo "\`\`\`bash" >> RELEASE_NOTES.md
          echo "pip install stegverse-sdk==${{ github.ref_name }}" >> RELEASE_NOTES.md
          echo "python -c \"import stegverse; print(stegverse.__version__)\"" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Post-Release Flow" >> RELEASE_NOTES.md
          echo "All downstream systems consume via **demo-ingestion** pipeline." >> RELEASE_NOTES.md
          echo "See: https://github.com/StegVerse-org/demo_ingest_engine" >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ============================================================
  # DEMO-INGESTION — triggers downstream pipeline
  # ============================================================
  demo-ingestion:
    runs-on: ubuntu-latest
    needs: [build, release]
    if: always() && needs.build.result == 'success'
    permissions:
      contents: read
      actions: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Upload SDK bundle for ingestion
        uses: actions/upload-artifact@v4
        with:
          name: sdk-bundle
          path: dist/*.whl
          retention-days: 90

      - name: Trigger demo-ingestion (plan mode)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Trigger run-ingest.yml in demo_ingest_engine repo
          # Pass the artifact download URL as source_path
          # The ingestion engine will need to handle URL-based sources

          ARTIFACT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

          echo "SDK Build Complete"
          echo "Artifact URL: $ARTIFACT_URL"
          echo "Release URL: $RELEASE_URL"
          echo ""

          # Trigger plan mode first to preview what would be ingested
          gh workflow run run-ingest.yml             --repo StegVerse-org/demo_ingest_engine             -f mode="plan"             -f source_path="$ARTIFACT_URL"             -f conflict_mode="archive"             || echo "Could not trigger demo_ingest_engine — check permissions or workflow name"

      - name: Trigger demo-ingestion (orchestrate mode — manual approval needed)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ""
          echo "=== DEMO-INGESTION ORCHESTRATION ==="
          echo "To complete ingestion, manually trigger:"
          echo "  Repo: StegVerse-org/demo_ingest_engine"
          echo "  Workflow: run-ingest.yml"
          echo "  Mode: orchestrate"
          echo "  Source: sdk-bundle artifact from run ${{ github.run_id }}"
          echo "  Conflict: archive"
          echo ""
          echo "Downstream chain:"
          echo "  SDK Release → demo-ingestion → TV/TVC ephemeral injection → GCAT-BCAT-Engine deploy → AaCT-E audit"
