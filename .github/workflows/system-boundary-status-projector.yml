name: System Boundary Status Projector

on:
  workflow_run:
    workflows:
      - StegVerse SDK Validation
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: system-boundary-status-projector
  cancel-in-progress: false

jobs:
  project:
    if: github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Project downstream status
        run: |
          python scripts/project_system_boundary_downstream_status.py \
            --run-id "${{ github.event.workflow_run.id }}" \
            --conclusion "${{ github.event.workflow_run.conclusion }}" \
            --source-commit "${{ github.event.workflow_run.head_sha }}" \
            --source-branch "${{ github.event.workflow_run.head_branch }}"
      - name: Persist downstream status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add evidence/system-boundary-downstream-status.v0.1.json
          if git diff --cached --quiet; then
            echo "No downstream status change."
            exit 0
          fi
          git commit -m "chore: project system-boundary validation status [status-only]"
          git pull --rebase
          git push
