name: SDK Validation Diagnostic

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'evidence/sdk-validation-diagnostic.json'
      - 'evidence/system-boundary-*.json'
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sdk-validation-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install SDK test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -c "import jsonschema, pytest, requests, yaml, dotenv"
      - name: Capture first exact failure
        run: python scripts/capture_sdk_validation_diagnostic.py
      - name: Persist diagnostic through repository contents API
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = 'evidence/sdk-validation-diagnostic.json';
            const content = fs.readFileSync(path, 'utf8');
            let currentSha;
            let currentContent = '';
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: 'main'
              });
              currentSha = existing.data.sha;
              currentContent = Buffer.from(existing.data.content, 'base64').toString('utf8');
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            if (currentContent === content) {
              core.info('No SDK validation diagnostic change.');
              return;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'chore: retain SDK validation diagnostic [diagnostic]',
              content: Buffer.from(content).toString('base64'),
              branch: 'main',
              sha: currentSha
            });
