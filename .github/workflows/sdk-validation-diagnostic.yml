name: SDK Validation Diagnostic

on:
  push:
    branches:
      - main
    paths-ignore:
      - evidence/sdk-validation-diagnostic.json
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sdk-validation-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install SDK test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -c "import jsonschema, pytest, requests, yaml, dotenv"
      - name: Capture first exact failure
        run: python scripts/capture_sdk_validation_diagnostic.py
      - name: Commit durable diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add evidence/sdk-validation-diagnostic.json
          if git diff --cached --quiet; then
            echo "No SDK validation diagnostic change."
            exit 0
          fi
          git commit -m "chore: retain SDK validation diagnostic [diagnostic]"
          git pull --rebase
          git push
