name: Dynamic Admissibility Tests

on:
  push:
    paths:
      - "stegverse/admissibility.py"
      - "stegverse/admissibility_receipts.py"
      - "stegverse/llm_admissibility.py"
      - "stegverse/math_admissibility.py"
      - "stegverse/bridge_registry.py"
      - "stegverse/receipts.py"
      - "schemas/admissibility/**"
      - "examples/*dynamic_admissibility*.py"
      - "examples/admissibility_receipt_reference.py"
      - "examples/list_dynamic_bridges.py"
      - "examples/verify_receipt_with_admissibility_reference.py"
      - "tests/test_admissibility_receipts.py"
      - "tests/test_dynamic_admissibility*.py"
      - "tests/test_llm_admissibility.py"
      - "tests/test_math_admissibility.py"
      - "tests/test_bridge_registry*.py"
      - "tests/test_receipts.py"
      - ".github/workflows/dynamic-admissibility-tests.yml"
  pull_request:
    paths:
      - "stegverse/admissibility.py"
      - "stegverse/admissibility_receipts.py"
      - "stegverse/llm_admissibility.py"
      - "stegverse/math_admissibility.py"
      - "stegverse/bridge_registry.py"
      - "stegverse/receipts.py"
      - "schemas/admissibility/**"
      - "examples/*dynamic_admissibility*.py"
      - "examples/admissibility_receipt_reference.py"
      - "examples/list_dynamic_bridges.py"
      - "examples/verify_receipt_with_admissibility_reference.py"
      - "tests/test_admissibility_receipts.py"
      - "tests/test_dynamic_admissibility*.py"
      - "tests/test_llm_admissibility.py"
      - "tests/test_math_admissibility.py"
      - "tests/test_bridge_registry*.py"
      - "tests/test_receipts.py"
      - ".github/workflows/dynamic-admissibility-tests.yml"
  workflow_dispatch:

jobs:
  dynamic-admissibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run dynamic admissibility tests
        run: |
          python -m pytest \
            tests/test_admissibility_receipts.py \
            tests/test_dynamic_admissibility.py \
            tests/test_dynamic_admissibility_public_api.py \
            tests/test_llm_admissibility.py \
            tests/test_math_admissibility.py \
            tests/test_bridge_registry.py \
            tests/test_bridge_registry_payload.py \
            tests/test_receipts.py

      - name: Run dynamic admissibility examples
        run: |
          python examples/dynamic_admissibility_packet.py
          python examples/admissibility_receipt_reference.py
          python examples/list_dynamic_bridges.py
          python examples/llm_dynamic_admissibility.py
          python examples/math_dynamic_admissibility.py
          python examples/verify_receipt_with_admissibility_reference.py
