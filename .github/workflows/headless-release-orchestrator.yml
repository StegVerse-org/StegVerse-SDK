name: Headless Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.5)'
        required: true
        type: string
      dry_run:
        description: 'Dry run'
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        run: |
          echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "Bad version"; exit 1; }

      - name: Bump version
        run: |
          OLD=$(grep '^version' pyproject.toml | sed "s/.*= *['\"]\(.*\)['\"].*/\1/")
          sed -i "s/version = ['\"]$OLD['\"]/version = '${{ inputs.version }}'/" pyproject.toml
          git config user.name "bot"
          git config user.email "bot@stegverse.org"
          git add -A
          git commit -m "Bump to ${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install build twine
      - run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
